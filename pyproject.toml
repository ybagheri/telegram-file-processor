[tool.ruff]
line-length = 110
target-version = "py310"

[tool.ruff.lint]
# Keep this light on purpose: the goal is to catch real mistakes (unused
# imports, undefined names) in CI, not to enforce a particular formatting
# style on top of what's already consistent in this codebase.
select = ["E", "F", "W"]
ignore = [
    "E501",  # line length — many strings here are Persian user-facing text
]

[tool.ruff.lint.per-file-ignores]
"dispatcher/dispatcher.py" = ["F401"]  # imports exist to trigger processor registration
